---
- name: Assert supported OS family
  ansible.builtin.assert:
    that:
      - ansible_facts["os_family"] == "Debian"
    fail_msg: "This playbook currently supports Debian-family hosts only."

- name: Ensure base packages are present
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
      - gpg
    state: present
    update_cache: true
