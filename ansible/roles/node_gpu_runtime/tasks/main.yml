---
- name: Configure node GPU runtime mode facts
  ansible.builtin.set_fact:
    node_gpu_runtime_mode: "{{ node_gpu_runtime_mode | default('skip', true) | string | lower | trim }}"
    node_gpu_runtime_apt_prereqs:
      - ca-certificates
      - curl
      - gpg
    node_gpu_runtime_repo_key_url: https://nvidia.github.io/libnvidia-container/gpgkey
    node_gpu_runtime_repo_key_tmp: /tmp/nvidia-container-toolkit.gpg
    node_gpu_runtime_repo_keyring: /usr/share/keyrings/nvidia-container-toolkit-keyring.gpg
    node_gpu_runtime_repo_file: /etc/apt/sources.list.d/nvidia-container-toolkit.list
    node_gpu_runtime_config_template: /var/lib/rancher/k3s/agent/etc/containerd/config.toml.tmpl
    node_gpu_runtime_config_rendered: /var/lib/rancher/k3s/agent/etc/containerd/config.toml

- name: Validate node GPU runtime mode
  ansible.builtin.assert:
    that:
      - node_gpu_runtime_mode in ['enable', 'amd', 'skip', 'uninstall']
    fail_msg: "node_gpu_runtime_mode must be one of: enable, amd, skip, uninstall"

- name: Verify NVIDIA GPU visibility on host
  ansible.builtin.command: nvidia-smi -L
  register: node_gpu_runtime_nvidia_smi
  changed_when: false
  failed_when: false
  when: node_gpu_runtime_mode == 'enable'

- name: Fail if nvidia-smi is unavailable
  ansible.builtin.fail:
    msg: "nvidia-smi is not available. Install or verify the NVIDIA driver on the worker host before enabling GPU runtime."
  when:
    - node_gpu_runtime_mode == 'enable'
    - node_gpu_runtime_nvidia_smi.rc != 0

- name: Ensure NVIDIA container toolkit apt prerequisites are present
  ansible.builtin.apt:
    name: "{{ node_gpu_runtime_apt_prereqs }}"
    state: present
    update_cache: true
  when: node_gpu_runtime_mode == 'enable'

- name: Configure NVIDIA container toolkit apt repository and package
  block:
    - name: Download NVIDIA container toolkit GPG key
      ansible.builtin.get_url:
        url: "{{ node_gpu_runtime_repo_key_url }}"
        dest: "{{ node_gpu_runtime_repo_key_tmp }}"
        mode: "0644"

    - name: Create keyring directory
      ansible.builtin.file:
        path: /usr/share/keyrings
        state: directory
        mode: "0755"

    - name: Install NVIDIA container toolkit keyring
      ansible.builtin.command:
        cmd: >-
          gpg --dearmor --yes --output {{ node_gpu_runtime_repo_keyring }}
          {{ node_gpu_runtime_repo_key_tmp }}
      args:
        creates: "{{ node_gpu_runtime_repo_keyring }}"

    - name: Configure NVIDIA container toolkit apt source list
      ansible.builtin.copy:
        dest: "{{ node_gpu_runtime_repo_file }}"
        content: |
          deb [signed-by={{ node_gpu_runtime_repo_keyring }}] https://nvidia.github.io/libnvidia-container/stable/deb/$(ARCH) /
          #deb [signed-by={{ node_gpu_runtime_repo_keyring }}] https://nvidia.github.io/libnvidia-container/experimental/deb/$(ARCH) /
        mode: "0644"

    - name: Install nvidia-container-toolkit package
      ansible.builtin.apt:
        name: nvidia-container-toolkit
        state: present
        update_cache: true

    - name: Remove temporary NVIDIA container toolkit key
      ansible.builtin.file:
        path: "{{ node_gpu_runtime_repo_key_tmp }}"
        state: absent
  when: node_gpu_runtime_mode == 'enable'
  rescue:
    - name: Fail with NVIDIA toolkit installation guidance
      ansible.builtin.fail:
        msg: >-
          Unable to install NVIDIA container toolkit. Validate access to
          https://nvidia.github.io/libnvidia-container and rerun the join workflow.

- name: Verify nvidia-ctk is available
  ansible.builtin.command: nvidia-ctk --version
  register: node_gpu_runtime_nvidia_ctk
  changed_when: false
  failed_when: false
  when: node_gpu_runtime_mode == 'enable'

- name: Fail if nvidia-ctk is unavailable
  ansible.builtin.fail:
    msg: >-
      nvidia-ctk is not available after toolkit installation. Confirm the
      nvidia-container-toolkit package installed successfully on the worker host.
  when:
    - node_gpu_runtime_mode == 'enable'
    - node_gpu_runtime_nvidia_ctk.rc != 0

- name: Assert k3s agent containerd template exists
  ansible.builtin.stat:
    path: "{{ node_gpu_runtime_config_template }}"
  register: node_gpu_runtime_template_stat
  when: node_gpu_runtime_mode == 'enable'

- name: Assert rendered k3s agent containerd config exists
  ansible.builtin.stat:
    path: "{{ node_gpu_runtime_config_rendered }}"
  register: node_gpu_runtime_rendered_stat
  when: node_gpu_runtime_mode == 'enable'

- name: Bootstrap containerd template from rendered config when template is absent
  # k3s v1.33+ writes config.toml directly without generating config.toml.tmpl.
  # Copy the rendered config as the template so nvidia-ctk has a stable file to patch,
  # and so k3s will use it as the base on subsequent restarts.
  ansible.builtin.copy:
    src: "{{ node_gpu_runtime_config_rendered }}"
    dest: "{{ node_gpu_runtime_config_template }}"
    remote_src: true
    mode: "0644"
  when:
    - node_gpu_runtime_mode == 'enable'
    - not node_gpu_runtime_template_stat.stat.exists
    - node_gpu_runtime_rendered_stat.stat.exists

- name: Fail if k3s agent containerd template is missing
  ansible.builtin.fail:
    msg: >-
      k3s agent containerd template was not found at {{ node_gpu_runtime_config_template }}
      and no rendered config exists at {{ node_gpu_runtime_config_rendered }} to bootstrap from.
      Ensure the k3s agent install completed before enabling GPU runtime.
  when:
    - node_gpu_runtime_mode == 'enable'
    - not node_gpu_runtime_template_stat.stat.exists
    - not node_gpu_runtime_rendered_stat.stat.exists

- name: Configure k3s agent containerd template for NVIDIA runtime
  ansible.builtin.shell: |
    set -euo pipefail
    before="$(sha256sum "{{ node_gpu_runtime_config_template }}" | awk '{print $1}')"
    nvidia-ctk runtime configure \
      --runtime=containerd \
      --config="{{ node_gpu_runtime_config_template }}" \
      --nvidia-runtime-name=nvidia
    after="$(sha256sum "{{ node_gpu_runtime_config_template }}" | awk '{print $1}')"
    if [[ "${before}" != "${after}" ]]; then
      echo "updated"
    fi
  args:
    executable: /bin/bash
  register: node_gpu_runtime_configure_result
  changed_when: "'updated' in node_gpu_runtime_configure_result.stdout"
  when: node_gpu_runtime_mode == 'enable'

- name: Restart k3s-agent after NVIDIA runtime config update
  ansible.builtin.systemd:
    name: k3s-agent
    state: restarted
  when:
    - node_gpu_runtime_mode == 'enable'
    - node_gpu_runtime_configure_result is changed

- name: Verify k3s agent containerd template includes NVIDIA runtime
  ansible.builtin.shell: |
    set -euo pipefail
    # k3s v1.33+ may expose runtime handlers via runtime metadata even when
    # config files do not contain legacy nvidia-ctk markers.
    if k3s crictl info 2>/dev/null | grep -Eq '"nvidia"[[:space:]]*:'; then
      exit 0
    fi

    check_runtime_config() {
      local config_path="$1"
      [[ -f "${config_path}" ]] || return 1
      grep -Eq 'runtimes\."?nvidia"?|nvidia-container-runtime|nvidia-ctk' "${config_path}"
    }

    check_runtime_config "{{ node_gpu_runtime_config_template }}" && exit 0
    check_runtime_config "{{ node_gpu_runtime_config_rendered }}" && exit 0
    exit 1
  args:
    executable: /bin/bash
  register: node_gpu_runtime_runtime_check
  changed_when: false
  failed_when: false
  when: node_gpu_runtime_mode == 'enable'

- name: Fail if NVIDIA runtime is not detected in the k3s agent template
  ansible.builtin.fail:
    msg: >-
      k3s agent containerd template does not list an NVIDIA runtime entry.
      Re-run bootstrap after verifying nvidia-ctk and the toolkit repo are installed correctly.
  when:
    - node_gpu_runtime_mode == 'enable'
    - node_gpu_runtime_runtime_check.rc != 0

- name: Note conservative uninstall behavior
  ansible.builtin.debug:
    msg: >-
      node_gpu_runtime_mode=uninstall performs no destructive host cleanup in this task.
      GPU runtime ownership cleanup will be handled by a dedicated ownership-registry-aware
      uninstall workflow before any package or config removal is added here.
  when: node_gpu_runtime_mode == 'uninstall'

# ── AMD ROCm GPU runtime ──────────────────────────────────────────────────────
# AMD GPU runtime requires only the amdgpu kernel module on the host (/dev/kfd).
# ROCm libraries are bundled in the ollama:rocm container image.
# The AMD k8s-device-plugin DaemonSet (k8s/managed/amd-gpu-device-plugin.yaml)
# handles device injection — no containerd runtime config changes are needed.

- name: Check AMD GPU kernel device node
  ansible.builtin.stat:
    path: /dev/kfd
  register: node_gpu_runtime_kfd_stat
  when: node_gpu_runtime_mode == 'amd'

- name: Fail if AMD GPU kernel device node is absent
  ansible.builtin.fail:
    msg: >-
      /dev/kfd not found on the host. The amdgpu kernel module must be loaded before
      enabling AMD GPU runtime. Install the amdgpu driver and reboot, then re-run the join workflow.
  when:
    - node_gpu_runtime_mode == 'amd'
    - not node_gpu_runtime_kfd_stat.stat.exists

- name: Verify AMD render device nodes are present
  ansible.builtin.shell: ls /dev/dri/renderD* 2>/dev/null | head -1
  register: node_gpu_runtime_render_check
  changed_when: false
  failed_when: false
  when: node_gpu_runtime_mode == 'amd'

- name: Warn if no DRI render nodes found
  ansible.builtin.debug:
    msg: >-
      No /dev/dri/renderD* devices found. GPU workloads may fail.
      Verify amdgpu is loaded and the GPU is recognized by the kernel.
  when:
    - node_gpu_runtime_mode == 'amd'
    - node_gpu_runtime_render_check.stdout == ''

- name: Ensure /var/lib/localk8s/ollama-models directory exists
  ansible.builtin.file:
    path: /var/lib/localk8s/ollama-models
    state: directory
    mode: "0755"
  when: node_gpu_runtime_mode == 'amd'
