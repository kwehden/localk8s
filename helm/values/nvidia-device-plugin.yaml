# NVIDIA device plugin chart values.
# Time-slicing is configured via config.map.<name> payload.

gfd:
  enabled: false

# Multi-node baseline: avoid CPU-only worker nodes while still allowing
# unlabeled control-plane and future GPU worker nodes.
affinity:
  nodeAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      nodeSelectorTerms:
        - matchExpressions:
            - key: localk8s.io/worker-class
              operator: NotIn
              values:
                - cpu
runtimeClassName: nvidia

config:
  default: config
  map:
    config: |
      version: v1
      flags:
        migStrategy: "none"
        failOnInitError: true
        nvidiaDriverRoot: "/"
        plugin:
          passDeviceSpecs: false
          deviceListStrategy: envvar
          deviceIDStrategy: uuid
      sharing:
        timeSlicing:
          resources:
            - name: nvidia.com/gpu
              replicas: 2
