[node_join_targets]
# Example GPU worker
gpu-worker-01 ansible_host=192.168.1.60 ansible_user=ubuntu localk8s_node_name=gpu-worker-01 localk8s_gpu_enable=true localk8s_node_labels=localk8s.io/worker-class=gpu-secondary,localk8s.io/accelerator=tesla-m10 localk8s_node_taints=

[node_join_targets:vars]
ansible_become=true
localk8s_k3s_url=https://laminarflow:6443
localk8s_allow_control_plane_remove=false

# Do not store join token in this file.
# Expected runtime source:
#   export K3S_JOIN_TOKEN='...'
# or interactive prompt in join/remove scripts.
