[node_join_targets]
# Example CPU worker (Ray-eligible, Ollama disabled by default profile labels)
polecat ansible_host=192.168.1.70 ansible_user=ubuntu localk8s_node_name=polecat localk8s_node_profile=cpu localk8s_node_labels=localk8s.io/workload-tier=general localk8s_node_taints=

# Example GPU worker (Ray + Ollama eligible by default profile labels)
standpunkt ansible_host=192.168.1.80 ansible_user=ubuntu localk8s_node_name=standpunkt localk8s_node_profile=gpu localk8s_node_labels=localk8s.io/accelerator=tesla-m10 localk8s_node_taints=

[node_join_targets:vars]
ansible_become=true
localk8s_k3s_url=https://<control-plane-hostname>:6443
localk8s_allow_control_plane_remove=false

# Do not store join token in this file.
# Expected runtime source:
#   export K3S_JOIN_TOKEN='...'
# or interactive prompt in join/remove scripts.
