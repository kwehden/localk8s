  template:
    metadata:
      labels:
        app.kubernetes.io/name: ollama-flenser-0
        app.kubernetes.io/managed-by: localk8s-bootstrap
        app.kubernetes.io/part-of: localk8s
        localk8s.io/ollama-pool: flenser
    spec:
      runtimeClassName: nvidia
      terminationGracePeriodSeconds: 60
      nodeSelector:
        kubernetes.io/hostname: "flenser"
      containers:
        - name: ollama
          image: ollama/ollama:0.19.0
          imagePullPolicy: IfNotPresent
          env:
            - name: OLLAMA_HOST
              value: 0.0.0.0:11434
          ports:
            - name: http
              containerPort: 11434
              hostPort: 11438
              protocol: TCP
          resources:
            requests:
              cpu: "1"
              memory: 4Gi
              nvidia.com/gpu: "1"
            limits:
              cpu: "4"
              memory: 12Gi
              nvidia.com/gpu: "1"
          readinessProbe:
            tcpSocket:
              port: 11434
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: 11434
            initialDelaySeconds: 30
            periodSeconds: 10
          volumeMounts:
            - name: ollama-models
              mountPath: /root/.ollama
      volumes:
        - name: ollama-models
          persistentVolumeClaim:
            claimName: ollama-flenser-models-hostdisk
---
