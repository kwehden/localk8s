---
# ── Flenser NVIDIA pool ──────────────────────────────────────────────────────
# Single Ollama pod on flenser (RTX 3060).
# Uses standard NVIDIA runtime path with runtimeClassName: nvidia.
# Models loaded on-demand from shared storage.
# External access: flenser:11438
# NOTE: PVC/service names keep the historical "amd" suffix to avoid PVC or client churn.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ollama-flenser-models-hostdisk
  namespace: ollama
  labels:
    app.kubernetes.io/name: ollama-flenser
    app.kubernetes.io/managed-by: localk8s-bootstrap
    app.kubernetes.io/part-of: localk8s
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: ollama-host-disk
  volumeName: ollama-flenser-models-pv
  resources:
    requests:
      storage: 100Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama-flenser-0
  namespace: ollama
