apiVersion: v1
kind: Service
metadata:
  name: local-ray-dashboard-svc
  namespace: ray
  labels:
    app.kubernetes.io/name: local-ray-dashboard
    app.kubernetes.io/managed-by: localk8s-bootstrap
    app.kubernetes.io/part-of: localk8s
spec:
  type: ClusterIP
  selector:
    ray.io/cluster: local-ray
    ray.io/node-type: head
  ports:
    - name: dashboard
      port: 8265
      targetPort: 8265
      protocol: TCP
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: ray-slash-redirect
  namespace: ray
  labels:
    app.kubernetes.io/managed-by: localk8s-bootstrap
    app.kubernetes.io/part-of: localk8s
spec:
  redirectRegex:
    regex: ^https?://([^/]+)/ray$
    replacement: http://${1}/ray/
    permanent: true
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: ray-strip-prefix
  namespace: ray
  labels:
    app.kubernetes.io/managed-by: localk8s-bootstrap
    app.kubernetes.io/part-of: localk8s
spec:
  stripPrefix:
    prefixes:
      - /ray
    forceSlash: true
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ray-dashboard
  namespace: ray
  labels:
    app.kubernetes.io/name: ray-dashboard
    app.kubernetes.io/managed-by: localk8s-bootstrap
    app.kubernetes.io/part-of: localk8s
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
    traefik.ingress.kubernetes.io/router.middlewares: ray-ray-slash-redirect@kubernetescrd,ray-ray-strip-prefix@kubernetescrd
spec:
  ingressClassName: traefik
  rules:
    - host: laminarflow
      http:
        paths:
          - path: /ray
            pathType: Prefix
            backend:
              service:
                name: local-ray-dashboard-svc
                port:
                  number: 8265
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: local-ray-dashboard-svc
                port:
                  number: 8265
          - path: /static
            pathType: Prefix
            backend:
              service:
                name: local-ray-dashboard-svc
                port:
                  number: 8265
          - path: /favicon.ico
            pathType: Exact
            backend:
              service:
                name: local-ray-dashboard-svc
                port:
                  number: 8265
          - path: /manifest.json
            pathType: Exact
            backend:
              service:
                name: local-ray-dashboard-svc
                port:
                  number: 8265
          - path: /asset-manifest.json
            pathType: Exact
            backend:
              service:
                name: local-ray-dashboard-svc
                port:
                  number: 8265
