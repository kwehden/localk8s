apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: k3s-slash-redirect
  namespace: k3s-dashboard
  labels:
    app.kubernetes.io/managed-by: localk8s-bootstrap
    app.kubernetes.io/part-of: localk8s
spec:
  replacePathRegex:
    regex: ^/k3s$
    replacement: /k3s/
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: k3s-dashboard
  namespace: k3s-dashboard
  labels:
    app.kubernetes.io/name: k3s-dashboard
    app.kubernetes.io/managed-by: localk8s-bootstrap
    app.kubernetes.io/part-of: localk8s
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
    traefik.ingress.kubernetes.io/router.middlewares: k3s-dashboard-k3s-slash-redirect@kubernetescrd
spec:
  ingressClassName: traefik
  rules:
    - host: laminarflow
      http:
        paths:
          - path: /k3s
            pathType: Prefix
            backend:
              service:
                name: headlamp
                port:
                  number: 80
